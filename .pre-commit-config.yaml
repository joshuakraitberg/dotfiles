repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Sanity
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=3000"]
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      # File checks
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      # Auto-formatting
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      # Security
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # SC1054/SC1083/SC1056/SC1072/SC1073: Go template {{ }} syntax confuses shellcheck parser
        args: ["--severity=warning", "-e", "SC1054,SC1083,SC1056,SC1072,SC1073"]
        types: [shell]

  # YAML/JSON/Markdown formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        args: ["--write", "--prose-wrap", "always"]

  # Check shell scripts for common issues
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: script-must-have-extension
        name: Check shell scripts have .sh extension
        types: [shell]
        exclude: '^(bootstrap\.sh|\.git|bin/)|\.tmpl$'
      - id: shfmt
        args: ["-i", "2", "-ci", "-w"]
        exclude: '\.tmpl$'
